{% extends "base.html" %}

{% block title %}Edit User - EduMind AI{% endblock %}

{% block page_title %}Edit User{% endblock %}

{% block content %}
<div class="glass-card rounded-2xl p-6">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="full_name" class="block text-sm font-medium text-slate-300 mb-2">Full Name</label>
                <input type="text" id="full_name" name="full_name" value="{{ user.full_name }}" class="w-full bg-slate-900/50 border border-white/10 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500/50 focus:ring-2 focus:ring-blue-500/20 transition-all">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-2">Email</label>
                <input type="email" id="email" name="email" value="{{ user.email }}" class="w-full bg-slate-900/50 border border-white/10 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500/50 focus:ring-2 focus:ring-blue-500/20 transition-all">
            </div>
            <div>
                <label for="role" class="block text-sm font-medium text-slate-300 mb-2">Role</label>
                <select id="role" name="role" class="w-full bg-slate-900/50 border border-white/10 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500/50 focus:ring-2 focus:ring-blue-500/20 transition-all">
                    <option value="student" {% if user.role == 'student' %}selected{% endif %}>Student</option>
                    <option value="lecturer" {% if user.role == 'lecturer' %}selected{% endif %}>Lecturer</option>
                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                    <option value="career_advisor" {% if user.role == 'career_advisor' %}selected{% endif %}>Career Advisor</option>
                </select>
            </div>
            <div class="flex items-center">
                <input type="checkbox" id="is_active" name="is_active" {% if user.is_active %}checked{% endif %} class="rounded border-slate-600 bg-slate-800 text-blue-500 focus:ring-blue-500/20">
                <label for="is_active" class="ml-2 text-sm text-slate-300">Active</label>
            </div>
        </div>
        <div class="mt-6 flex justify-end">
            <button type="submit" class="px-6 py-3 bg-blue-500/20 text-blue-400 rounded-xl hover:bg-blue-500/30 transition-all border border-blue-500/30">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
